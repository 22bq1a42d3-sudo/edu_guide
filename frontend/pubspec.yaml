name: eduguide
description: A personalized career navigator app for students after 10th standard.

# The version number: major.minor.patch+build
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # If you plan to add images (e.g., logos, illustrations) put them under assets/
  # and uncomment below lines:
  # assets:
  #   - assets/images/
